name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Nix
      uses: cachix/install-nix-action@v27
      with:
        extra_nix_config: |
          experimental-features = nix-command flakes

    - uses: cachix/cachix-action@v15
      with:
        name: logos-co
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

    - name: Build logos-liblogos-tests
      run: nix build .#logos-liblogos-tests
    
    - name: Run logos_core_test
      run: ./result/bin/logos_core_tests
